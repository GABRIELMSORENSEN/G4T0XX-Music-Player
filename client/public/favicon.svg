<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Headphone arc -->
  <path d="M10 26 Q10 10 32 10 Q54 10 54 26" fill="none" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Ear cups -->
  <rect x="6" y="24" width="8" height="12" rx="3" fill="#e11d48"/>
  <rect x="50" y="24" width="8" height="12" rx="3" fill="#e11d48"/>
  <!-- Cat head -->
  <ellipse cx="32" cy="42" rx="18" ry="16" fill="#1a1a1a"/>
  <!-- Ears -->
  <polygon points="16,30 12,18 24,28" fill="#1a1a1a"/>
  <polygon points="48,30 52,18 40,28" fill="#1a1a1a"/>
  <polygon points="16.5,29 13.5,20 23,27.5" fill="#e11d48" opacity="0.7"/>
  <polygon points="47.5,29 50.5,20 41,27.5" fill="#e11d48" opacity="0.7"/>
  <!-- Eyes -->
  <ellipse cx="25" cy="41" rx="3.5" ry="3" fill="white"/>
  <ellipse cx="39" cy="41" rx="3.5" ry="3" fill="white"/>
  <circle cx="26" cy="41" r="1.8" fill="#111"/>
  <circle cx="40" cy="41" r="1.8" fill="#111"/>
  <circle cx="26.8" cy="40.2" r="0.6" fill="white"/>
  <circle cx="40.8" cy="40.2" r="0.6" fill="white"/>
  <!-- Nose -->
  <polygon points="32,47 30,50 34,50" fill="#e11d48"/>
  <!-- Mouth -->
  <path d="M30,50 Q32,53 34,50" fill="none" stroke="#e11d48" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="22" y1="48" x2="10" y2="46" stroke="#555" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="10" y2="52" stroke="#555" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="42" y1="48" x2="54" y2="46" stroke="#555" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="42" y1="50" x2="54" y2="52" stroke="#555" stroke-width="0.8" stroke-linecap="round"/>
</svg>
